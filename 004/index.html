<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>整合頁面：導覽列 + Mega Menu + 輪播與卡片</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* 自訂導覽列與 Mega Menu 樣式 */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2c3e50;
      padding: 10px 0;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .navbar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .navbar li {
      margin: 0 20px;
      position: relative;
      cursor: pointer;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .mega-menu {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 60px;
      background-color: #ecf0f1;
      width: 80vw;
      max-width: 1000px;
      padding: 20px;
      display: none;
      z-index: 1000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .mega-menu.active {
      display: block;
    }

    .mega-menu h3 {
      margin-top: 0;
      color: #2c3e50;
    }

    .image-block {
      width: 100%;
      height: 400px;
      background-color: #f0f0f0;
      background-image: url('https://via.placeholder.com/1500x400?text=模擬圖片區塊');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>

  <!-- Header 導覽列 -->
  <header>
    <nav class="navbar">
      <ul>
        <li onmouseenter="toggleMenu('menu1')" onmouseleave="hideMenu()">爭議議案簡述</li>
        <li onmouseenter="toggleMenu('menu2')" onmouseleave="hideMenu()">法律知識科普區</li>
      </ul>
    </nav>
  </header>

  <!-- Mega Menu 區塊 -->
  <div id="menu1" class="mega-menu" onmouseenter="cancelHide()" onmouseleave="hideMenu()">
    <h3>爭議議案簡述</h3>
    <p>這裡是爭議議案簡述的內容。</p>
  </div>

  <div id="menu2" class="mega-menu" onmouseenter="cancelHide()" onmouseleave="hideMenu()">
    <h3>法律知識科普區</h3>
    <p>這裡是法律知識科普區的內容。</p>
  </div>

  <!-- 模擬圖片區塊 -->
  <div class="image-block"></div>

  <!-- Bootstrap 輪播 -->
  <div id="carouselExample" class="carousel slide my-5" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://via.placeholder.com/800x300?text=第一張" class="d-block w-100" alt="第一張">
      </div>
      <div class="carousel-item">
        <img src="https://via.placeholder.com/800x300?text=第二張" class="d-block w-100" alt="第二張">
      </div>
      <div class="carousel-item">
        <img src="https://via.placeholder.com/800x300?text=第三張" class="d-block w-100" alt="第三張">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- 卡片區塊 -->
  <div class="container my-5">
    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="https://via.placeholder.com/400x200?text=卡片1" class="card-img-top" alt="卡片1">
          <div class="card-body">
            <h5 class="card-title">卡片 1</h5>
            <p class="card-text">這是卡片 1 的內容。</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="https://via.placeholder.com/400x200?text=卡片2" class="card-img-top" alt="卡片2">
          <div class="card-body">
            <h5 class="card-title">卡片 2</h5>
            <p class="card-text">這是卡片 2 的內容。</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="https://via.placeholder.com/400x200?text=卡片3" class="card-img-top" alt="卡片3">
          <div class="card-body">
            <h5 class="card-title">卡片 3</h5>
            <p class="card-text">這是卡片 3 的內容。</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap + 自訂互動腳本 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let timeout;
    function toggleMenu(id) {
      clearTimeout(timeout);
      document.querySelectorAll('.mega-menu').forEach(menu => menu.classList.remove('active'));
      const menu = document.getElementById(id);
      if (menu) {
        menu.classList.add('active');
      }
    }

    function hideMenu() {
      timeout = setTimeout(() => {
        document.querySelectorAll('.mega-menu').forEach(menu => menu.classList.remove('active'));
      }, 200);
    }

    function cancelHide() {
      clearTimeout(timeout);
    }
  </script>
</body>
</html>
